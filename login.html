<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Kas & Informasi RW</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 5px;
            color: #333;
        }
        .login-card p {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-login:hover {
            background: #3498db;
        }
        .error-msg {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Sistem RW 02</h2>
        <p>Silakan masuk untuk melanjutkan</p>
        
        <form id="form-login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn-login">Masuk Aplikasi</button>
            <div id="error-box" class="error-msg">Username atau password salah!</div>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            // Simulasi Akun Sementara (Nanti bisa dihubungkan ke PHP/MySQL)
            if (user === 'admin' && pass === 'rw02admin') {
                localStorage.setItem('userRole', 'admin');
                localStorage.setItem('userName', 'Pengurus RW');
                window.location.href = 'index.html';
            } else if (user === 'warga' && pass === 'warga02') {
                localStorage.setItem('userRole', 'warga');
                localStorage.setItem('userName', 'Warga RW 02');
                window.location.href = 'index.html';
            } else {
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
